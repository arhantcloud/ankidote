name: AnkidoteMobile
options:
  bundleIdPrefix: com.ankidote
  createIntermediateGroups: true
  deploymentTarget:
    iOS: "17.0"
settings:
  base:
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: ""
    CODE_SIGNING_REQUIRED: "NO"
    CODE_SIGNING_ALLOWED: "NO"
targets:
  AnkidoteMobile:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: AnkidoteMobile
        excludes:
          - "**/*.md"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.ankidote.mobile
        MARKETING_VERSION: "0.1.0"
        CURRENT_PROJECT_VERSION: "1"
        SDKROOT: iphoneos
        SUPPORTED_PLATFORMS: "iphonesimulator iphoneos"
        TARGETED_DEVICE_FAMILY: "1,2"
        GENERATE_INFOPLIST_FILE: "YES"
        INFOPLIST_KEY_UILaunchScreen_Generation: "YES"
        INFOPLIST_KEY_CFBundleDisplayName: "Ankidote"
        INFOPLIST_KEY_UIApplicationSupportsIndirectInputEvents: "YES"
        INFOPLIST_KEY_UISupportedInterfaceOrientations: "UIInterfaceOrientationPortrait"
        SWIFT_OBJC_BRIDGING_HEADER: "AnkidoteMobile/Bridging/AnkidoteMobile-Bridging-Header.h"
        # SQLite is linked via `import SQLite3`.
        OTHER_LDFLAGS:
          - "-lsqlite3"
        GCC_PREPROCESSOR_DEFINITIONS:
          - "$(inherited)"
          - "ZSTD_DISABLE_ASM=1"
        HEADER_SEARCH_PATHS:
          - "$(SRCROOT)/AnkidoteMobile/Vendor/zstd"
          - "$(SRCROOT)/AnkidoteMobile/Vendor/zstd/common"
          - "$(SRCROOT)/AnkidoteMobile/Vendor/zstd/compress"
          - "$(SRCROOT)/AnkidoteMobile/Vendor/zstd/decompress"
        # zstd's own sources are third-party; silence their warnings.
        GCC_WARN_INHIBIT_ALL_WARNINGS: "YES"
